name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # engines.node >=22 이므로 최소 지원 버전(22), 최신 Active LTS(24),
        # 아직 LTS 승격 전인 최신 Current(26)까지 선행 검증한다.
        node-version: ['22', '24', '26']
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:coverage
      - run: npm run build
