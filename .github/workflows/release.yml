name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build
      # Trusted Publishing(OIDC)은 npm CLI 11.5.1+ 필요.
      # actions/setup-node가 깔아주는 npm이 이보다 낮을 수 있어 명시적으로 올린다.
      - run: npm install -g npm@latest
      - run: npm publish --provenance --access public
